name: Release

# Triggered when a v* tag is pushed (e.g. v0.4.0) -> build + package .zip + create a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check (compile + lint + test)
        run: |
          pnpm compile
          pnpm lint
          pnpm test

      - name: Package (Chrome/Edge MV3)
        run: pnpm zip

      # Release body = the CHANGELOG section for the tagged version, so downloaders immediately see
      # "what this build does" instead of a raw commit list. Missing section -> FAIL (forces a CHANGELOG entry).
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v hdr="## [$VERSION] " '
            index($0, hdr) == 1 { found = 1; next }
            found && /^## \[/   { exit }
            found               { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::Could not find the '## [$VERSION]' section in CHANGELOG.md — add it before tagging."
            exit 1
          fi
          cat release-notes.md

      - name: Create GitHub Release + attach .zip
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
